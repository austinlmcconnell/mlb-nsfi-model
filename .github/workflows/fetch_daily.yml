name: Fetch Daily MLB Data

on:
  schedule:
    # Run at 1:00 PM ET (17:00 UTC) — most lineups posted by then
    - cron: "0 17 * * *"
    # Run again at 5:30 PM ET (21:30 UTC) — catch late lineups + updated odds
    - cron: "30 21 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Fetch today's data
        run: python3 fetch_daily.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Auto-fetch daily data for ${DATE}"
            git push
          fi
