name: Fetch Daily MLB Data

on:
  schedule:
    - cron: "30 15 * * *"  # 11:30 AM ET
    - cron: "30 18 * * *"  # 2:30 PM ET
    - cron: "30 21 * * *"  # 5:30 PM ET
    - cron: "30 0 * * *"   # 8:30 PM ET
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Install Python dependencies
        run: pip install requests selenium

      - name: Install ChromeDriver
        run: |
          CHROME_VERSION=$(google-chrome --version | grep -oP '\d+\.\d+\.\d+')
          pip install chromedriver-autoinstaller
          python -c "import chromedriver_autoinstaller; chromedriver_autoinstaller.install()"

      - name: Fetch today's data
        run: python3 fetch_daily.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_*.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "Auto-fetch daily data for ${DATE}"
            git push
          fi
